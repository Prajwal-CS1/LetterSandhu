<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Letter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@400;700&display=swap');

        :root {
            --primary-red: #ff3b30;
            --primary-blue: #007aff;
            --dark-bg: #1a1a2e;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--primary-blue) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 90%;
            max-width: 500px;
            perspective: 1000px;
        }

        /* Closed Letter / Envelope */
        .envelope {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .envelope:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            background: rgba(255, 255, 255, 0.15);
        }

        .envelope.open-animation {
            opacity: 0;
            transform: scale(0.8) translateY(-100px);
            pointer-events: none;
            position: absolute;
            width: 100%;
            box-sizing: border-box;
        }

        .envelope h1 {
            color: #fff;
            font-size: 4rem;
            margin: 0 0 30px 0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .open-btn {
            background: linear-gradient(90deg, #ffffff, #f0f0f0);
            color: var(--primary-blue);
            border: none;
            border-radius: 30px;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Outfit', sans-serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        /* Opened Letter */
        .letter-content {
            background: #ffffff;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: scale(0.8) translateY(100px);
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .letter-content.show {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
            position: relative;
        }

        /* Task: To Sandhya in Red */
        .recipient {
            font-size: 1.8rem;
            color: var(--primary-red);
            text-align: left;
            margin-bottom: 25px;
            font-weight: bold;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .cat-image {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            margin: 0 auto 20px auto;
            display: block;
            border: 4px solid #fff;
            outline: 3px dashed var(--primary-red);
            outline-offset: 4px;
        }

        .fancy-text {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: var(--primary-red);
            margin: 30px 0;
            line-height: 1.2;
            background: linear-gradient(90deg, var(--primary-red), var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Task: From Prajwal in Blue */
        .sender {
            font-size: 1.2rem;
            color: #555;
            text-align: right;
            margin-top: 30px;
            font-style: italic;
        }

        .sender strong {
            color: var(--primary-blue);
            font-size: 1.6rem;
            font-family: 'Outfit', sans-serif;
            font-style: normal;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            animation: float 10s infinite linear;
            pointer-events: none;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0) rotate(0deg);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100px) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <audio id="bgMusic" loop>
        <source src="Cigarettes_After_Sex_-_Sunsets_(mp3.pm).mp3" type="audio/mpeg">
    </audio>

    <div class="particle" style="width: 20px; height: 20px; left: 10%;"></div>
    <div class="particle" style="width: 35px; height: 35px; left: 30%; animation-delay: 2s;"></div>
    <div class="particle" style="width: 15px; height: 15px; left: 70%; animation-delay: 1s;"></div>

    <div class="container">
        <div class="envelope" id="envelope" onclick="openLetter()">
            <h1>💌</h1>
            <button class="open-btn">
                <span>Open</span> 😼
            </button>
        </div>

        <div class="letter-content" id="letter">
            <div class="recipient">To, Sandhya</div>

            <img src="cat.png" alt="Funny Cat" class="cat-image" id="cat-img">

            <div class="fancy-text">sandhya is gay <br> (you are stil gay) </br> </div>

            <div class="sender">
                From,<br>
                <strong>Prajwal</strong>
            </div>
        </div>
    </div>

    <script>
        function openLetter() {
            const envelope = document.getElementById('envelope');
            const letter = document.getElementById('letter');
            const music = document.getElementById('bgMusic');

            // Play the music
            music.play().catch(error => {
                console.log("Autoplay blocked or file not found:", error);
            });

            envelope.classList.add('open-animation');

            setTimeout(() => {
                letter.classList.add('show');
                createConfetti();
            }, 300);
        }

        function createConfetti() {
            const colors = ['#ff3b30', '#007aff', '#ffffff'];
            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'absolute';
                confetti.style.width = Math.random() * 10 + 5 + 'px';
                confetti.style.height = Math.random() * 10 + 5 + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10px';
                confetti.style.zIndex = '9999';
                confetti.style.transition = 'all 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)';

                document.body.appendChild(confetti);

                setTimeout(() => {
                    confetti.style.transform = `translate(${Math.random() * 200 - 100}px, ${window.innerHeight + 100}px) rotate(${Math.random() * 720}deg)`;
                    confetti.style.opacity = '0';
                }, 50);

                setTimeout(() => { confetti.remove(); }, 2550);
            }
        }
    </script>
</body>

</html>
